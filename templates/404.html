<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Room Not Found | FIND ROOM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Style Matching Image */
        header {
            background: #ffffff;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .logo {
            font-weight: 700;
            font-size: 22px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logo span {
            color: #ff5a00; /* Theme Orange */
        }

        /* Main 404 Content Container */
        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            line-height: 1;
            color: #0076ec; /* Theme Sky Blue */
            margin-bottom: 10px;
            position: relative;
        }

        /* Creative subtitle matching the theme */
        .error-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #222;
        }

        .error-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Action Buttons matching "Book room" and "room details" */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-orange {
            background-color: #ff5a00; /* Exact Match: Add Room / Book Room */
            color: #ffffff;
        }

        .btn-orange:hover {
            background-color: #e04f00;
            transform: translateY(-2px);
        }

        .btn-blue {
            background-color: #0076ec; /* Exact Match: room details */
            color: #ffffff;
        }

        .btn-blue:hover {
            background-color: #0062c4;
            transform: translateY(-2px);
        }

        /* Footer matching SceneSwitcher.io banner */
        footer {
            background-color: #0066cc; /* Solid dark blue footer base */
            color: #ffffff;
            padding: 30px 5%;
            text-align: center;
            font-size: 14px;
        }

        footer p {
            opacity: 0.8;
            margin-top: 15px;
            font-size: 12px;
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            .error-code { font-size: 90px; }
            .error-title { font-size: 20px; }
            .btn-group { flex-direction: column; width: 100%; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='%23ff5a00'><path d='M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'/></svg>" alt="Icon" style="vertical-align: middle;">
            FIND <span>ROOM</span>
        </div>
    </header>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">This Room is Out of Bounds!</h1>
        <p class="error-message">
            Oops! The page you are looking for might have been moved, deleted, or the room listing has already been taken down by the owner. 
        </p>
        
        <div class="btn-group">
            <a href="/" class="btn btn-orange">Go Back Home</a>
            <!-- <a href="/search" class="btn btn-blue">Start New Search</a> -->
        </div>
    </div>

    <footer>
        <div>SceneSwitcher.io</div>
        <p>© 2026 SceneSwitcher.io. All rights reserved.</p>
    </footer>

</body>
</html>
